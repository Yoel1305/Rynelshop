<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Wax - Rynel'Shop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bubbles">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="gold-particles">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- NAVIGATION -->
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="wax.html" class="active">Wax</a></li>
            <li><a href="bazin.html">Bazin</a></li>
            <li><a href="#" onclick="togglePanier()">Panier (<span id="compteur">0</span>) 🛒</a></li>
        </ul>
    </nav>

    <h1>Collection Wax</h1>

    <div class="products-container">
        <!-- Produit 1 -->
        <div class="product" data-id="wax1" data-price="5000">
            <img src="images/wax1.jpg" alt="Wax Rouge">
            <h3 class="product-name">Wax Rouge Passion</h3>
            <div class="quantity">
                <button class="minus">-</button>
                <span class="number">0</span>
                <button class="plus">+</button>
            </div>
            <button class="add-to-cart">Ajouter au panier</button>
        </div>

        <!-- Produit 2 -->
        <div class="product" data-id="wax2" data-price="6000">
            <img src="images/wax2.jpg" alt="Wax Bleu">
            <h3 class="product-name">Wax Bleu Éclat</h3>
            <div class="quantity">
                <button class="minus">-</button>
                <span class="number">0</span>
                <button class="plus">+</button>
            </div>
            <button class="add-to-cart">Ajouter au panier</button>
        </div>

        <!-- Produit 3 -->
        <div class="product" data-id="wax3" data-price="7000">
            <img src="images/wax3.jpg" alt="Wax Vert">
            <h3 class="product-name">Wax Vert Émeraude</h3>
            <div class="quantity">
                <button class="minus">-</button>
                <span class="number">0</span>
                <button class="plus">+</button>
            </div>
            <button class="add-to-cart">Ajouter au panier</button>
        </div>
    </div>

    <a href="index.html">← Retour à l'accueil</a>

    <!-- PANIER -->
    <div id="panier">
        <h3>Panier 🛒</h3>
        <div id="liste-panier"></div>
        <p id="total-general"></p>
        <button onclick="viderPanier()" class="btn danger">Vider le panier</button>
        <button onclick="envoyerWhatsApp()" class="btn">Commander via WhatsApp</button>
        <button onclick="fermerPanier()" class="btn">Fermer</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
